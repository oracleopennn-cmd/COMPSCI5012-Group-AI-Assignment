{% extends "base.html" %}

{% block title %}Sign In{% endblock %}

{% block body %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-side">
            <h2>Welcome back 👋</h2>
            <p>Sign in to sync your learning history, recommendations and paths.</p>
        </div>
        <div class="auth-form">
            <h3>Sign In</h3>
            {% if error %}
                <p class="auth-error">{{ error }}</p>
            {% endif %}
            <form method="post">
                {% csrf_token %}
                <div class="auth-field">
                    <label>Username</label>
                    <input type="text" name="username" class="auth-input" value="user">
                </div>
                <div class="auth-field">
                    <label>Password</label>
                    <input type="password" name="password" class="auth-input" value="123456">
                </div>
                <button type="submit" class="auth-button primary">
                    Sign In
                </button>
                <p class="auth-footer-text">
                    Don't have an account yet? <a href="/user/signup/">Sign up</a>
                </p>
            </form>
        </div>
    </div>
</div>
{% endblock %}
