{% extends "base.html" %}

{% block title %}Edit Learning Path{% endblock %}

{% block body %}
<div class="container">
    <div class="path-form-header">
        <h2>Edit Learning Path</h2>
        <a href="{% url 'path_detail' path.id %}">Back to detail</a>
    </div>

    <div class="card path-form-card">
        {% if error %}
            <div class="path-form-error">{{ error }}</div>
        {% endif %}

        <form method="post" class="path-form">
            {% csrf_token %}
            <div class="path-form-field">
                <label class="path-form-label">Path title *</label>
                <input type="text" name="title" class="path-form-input" value="{{ path.title }}" required>
            </div>

            <div class="path-form-field">
                <label class="path-form-label">Description</label>
                <textarea name="description" class="path-form-textarea" rows="4">{{ path.description }}</textarea>
            </div>

            <div class="path-form-row">
                <div class="path-form-field">
                    <label class="path-form-label">Target language</label>
                    <input type="text" name="language" class="path-form-input" value="{{ path.language }}">
                </div>

                <div class="path-form-field">
                    <label class="path-form-label">Target level</label>
                    <input type="text" name="target_level" class="path-form-input" value="{{ path.target_level }}">
                </div>
            </div>

            <div class="path-form-actions">
                <button type="submit" class="path-form-submit">Save</button>
                <a href="{% url 'path_detail' path.id %}" class="path-form-cancel">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
