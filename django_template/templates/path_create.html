{% extends "base.html" %}

{% block title %}Create Learning Path{% endblock %}

{% block body %}
<div class="container">
    <div class="path-form-header">
        <h2>Create Learning Path</h2>
        <a href="{% url 'path_page' %}">Back to list</a>
    </div>

    <div class="card path-form-card">
        {% if error %}
            <div class="path-form-error">{{ error }}</div>
        {% endif %}

        <form method="post" class="path-form">
            {% csrf_token %}
            <div class="path-form-field">
                <label class="path-form-label">Path title *</label>
                <input type="text" name="title" class="path-form-input" required placeholder="e.g. French from Intro to Advanced">
            </div>

            <div class="path-form-field">
                <label class="path-form-label">Description</label>
                <textarea name="description" class="path-form-textarea" rows="4" placeholder="Describe the goal and content of this learning path..."></textarea>
            </div>

            <div class="path-form-row">
                <div class="path-form-field">
                    <label class="path-form-label">Target language</label>
                    <input type="text" name="language" class="path-form-input" placeholder="e.g. French">
                </div>

                <div class="path-form-field">
                    <label class="path-form-label">Target level</label>
                    <input type="text" name="target_level" class="path-form-input" placeholder="e.g. A1-B2">
                </div>
            </div>

            <div class="path-form-actions">
                <button type="submit" class="path-form-submit">Create</button>
                <a href="{% url 'path_page' %}" class="path-form-cancel">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
